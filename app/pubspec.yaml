name: app
description: "College Marks Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # Firebase Core
  firebase_core: ^3.3.0
  
  # Firebase Services
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.1.0
  
  # State Management
  provider: ^6.1.2
  
  # PDF Generation & Printing
  pdf: ^3.11.0
  printing: ^5.12.0
  
  # Date/Time Formatting (for attendance screens)
  intl: ^0.19.0
  
  # HTTP Client (for future n8n integration)
  http: ^1.2.2
  
  # Charts (optional - for future analytics)
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  # Optional: Add these if you have assets
  # assets:
  #   - assets/images/
  #   - assets/icons/
  
  # Optional: Add fonts
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700